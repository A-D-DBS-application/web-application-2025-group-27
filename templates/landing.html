<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rival - Startup Intelligence</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config with Custom Colors and Fonts -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#ecfdf5',
                            600: '#059669',
                            700: '#047857',
                        },
                        warm: {
                            50: '#FAF8F3',
                            100: '#F5F3ED',
                        },
                    },
                    fontFamily: {
                        display: ['Crimson Pro', 'serif'],
                        body: ['Manrope', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    
    <!-- Loading Screen Styles -->
    <style>
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FAF8F3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease-out;
        }
        
        #loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        
        #loading-screen.hidden {
            display: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #E5E7EB;
            border-top-color: #059669;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        .loading-text {
            margin-top: 20px;
            font-family: 'Manrope', sans-serif;
            font-size: 14px;
            color: #64748B;
            font-weight: 500;
        }
    </style>
    
    <!-- Early loading screen initialization -->
    <script>
        // Ensure loading screen is visible immediately, even before DOM is ready
        (function() {
            // This runs as early as possible
            if (document.readyState === 'loading') {
                // Page is still loading - good, loading screen will show
            } else {
                // If page loads very fast, ensure loading screen shows briefly
                document.addEventListener('DOMContentLoaded', function() {
                    const loadingScreen = document.getElementById('loading-screen');
                    if (loadingScreen) {
                        loadingScreen.classList.remove('hidden', 'fade-out');
                    }
                });
            }
        })();
    </script>
</head>
<body class="bg-warm-50 min-h-screen flex flex-col">
    <!-- Loading Screen -->
    <div id="loading-screen" role="status" aria-live="polite" aria-label="Loading page content">
        <div class="spinner" aria-hidden="true"></div>
        <p class="loading-text">Loading...</p>
    </div>
    
    <!-- Header with Logo -->
    <header class="pt-8 pb-4 text-center">
        <div class="flex items-center justify-center gap-4 mb-2">
            <!-- Rival Logo - Lion Head with Crown -->
            <svg width="48" height="48" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="inline-block">
                <!-- Background circle -->
                <circle cx="20" cy="20" r="20" fill="#059669" class="transition-all duration-200"/>
                <!-- Crown on top (3 pointed peaks) - perfectly centered -->
                <path d="M12 16 L14 10 L16 12 L18 8 L19 6 L20 5 L21 6 L22 8 L24 12 L26 10 L28 16 L28 18 L12 18 Z" 
                      fill="white"/>
                <!-- Lion head profile (facing left) - centered -->
                <!-- Main head shape with mane -->
                <path d="M28 18 L28 22 L26 26 L24 28 L22 30 L20 31 L18 30 L16 28 L14 26 L12 22 L12 18 L14 16 L16 18 L18 20 L19 20 L20 20 L21 20 L22 18 L24 16 L26 18 Z" 
                      fill="white"/>
                <!-- Lion mane texture (left side) -->
                <path d="M12 20 L10 18 L10 22 L12 24" 
                      fill="white"/>
                <path d="M14 22 L12 20 L12 24 L14 26" 
                      fill="white"/>
                <!-- Ear detail -->
                <path d="M14 18 L12 16 L14 14 L16 16" 
                      fill="white"/>
                <!-- Eye (centered) -->
                <circle cx="20" cy="24" r="1.5" fill="#059669"/>
                <!-- Muzzle/nose (pointed left) -->
                <path d="M26 24 L28 22 L26 20" 
                      stroke="#059669" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            </svg>
            <h1 class="font-display text-4xl md:text-5xl font-semibold text-slate-900">Rival</h1>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center px-6 py-8 md:py-12">
        <div class="max-w-4xl w-full">
            <div class="text-center space-y-8 md:space-y-10">
                <!-- Header -->
                <h2 class="font-display text-4xl md:text-6xl lg:text-7xl font-semibold text-slate-900 leading-tight whitespace-nowrap">
                    Your Market, Unlocked
                </h2>
                
                <!-- Subtitle -->
                <p class="text-base md:text-lg lg:text-xl text-slate-600 leading-relaxed max-w-3xl mx-auto font-body">
                    Rival helps founders, operators and strategy teams understand their market at lightning speed. With AI-driven monitoring, Rival tracks your competitor field and surfaces key company updates as they happen.
                </p>
                
                <!-- Loved by StarApps -->
                <div class="flex items-center justify-center gap-2 pt-2">
                    <span class="text-sm text-slate-500">Loved by</span>
                    <a href="https://www.starapps.com/" target="_blank" rel="noopener" class="text-sm font-semibold text-primary-600 hover:text-primary-700 transition-colors duration-200">
                        StarApps
                    </a>
                </div>
                
                <!-- CTA Buttons -->
                <div class="flex flex-col sm:flex-row gap-4 justify-center items-stretch sm:items-center pt-4">
                    <a 
                        href="{{ url_for('auth.signup') }}" 
                        class="px-6 py-3 md:px-10 md:py-4 bg-primary-600 text-white font-medium text-base md:text-lg rounded-lg hover:bg-primary-700 transition-all duration-200 shadow-sm hover:shadow text-center"
                    >
                        Get started
                    </a>
                    <a 
                        href="{{ url_for('auth.login') }}" 
                        class="px-6 py-3 md:px-10 md:py-4 bg-white text-slate-900 font-medium text-base md:text-lg rounded-lg border border-slate-200 hover:bg-warm-100 transition-all duration-200 shadow-sm hover:shadow text-center"
                    >
                        Login
                    </a>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Loading Screen Script -->
    <script>
        (function() {
            const loadingScreen = document.getElementById('loading-screen');
            if (!loadingScreen) return;
            
            let pageLoadStartTime = performance.now();
            let minDisplayTime = 300; // Minimum 300ms display time for visibility
            let isHiding = false;
            
            // Ensure loading screen is visible initially
            loadingScreen.classList.remove('hidden', 'fade-out');
            
            function hideLoadingScreen() {
                if (isHiding) return;
                isHiding = true;
                
                const elapsed = performance.now() - pageLoadStartTime;
                const remainingTime = Math.max(0, minDisplayTime - elapsed);
                
                setTimeout(function() {
                    loadingScreen.classList.add('fade-out');
                    setTimeout(function() {
                        loadingScreen.classList.add('hidden');
                    }, 500);
                }, remainingTime);
            }
            
            // Hide loading screen when page is fully loaded
            if (document.readyState === 'complete') {
                // Page already loaded, but still show it briefly
                hideLoadingScreen();
            } else {
                // Wait for full page load
                window.addEventListener('load', hideLoadingScreen);
                
                // Fallback: if load event doesn't fire, hide after DOM is ready
                if (document.readyState === 'interactive') {
                    setTimeout(function() {
                        if (!isHiding) {
                            hideLoadingScreen();
                        }
                    }, 1000);
                }
            }
            
            // Show loading screen when navigating away (on link clicks)
            document.addEventListener('click', function(e) {
                const link = e.target.closest('a[href]');
                if (link && link.href && !link.target && !link.hasAttribute('download')) {
                    // Check if it's an internal link
                    const currentHost = window.location.host;
                    try {
                        const linkUrl = new URL(link.href, window.location.href);
                        if (linkUrl.host === currentHost || linkUrl.host === '') {
                            // Internal navigation - show loading screen immediately
                            loadingScreen.classList.remove('hidden', 'fade-out');
                        }
                    } catch (e) {
                        // Relative URL - treat as internal
                        loadingScreen.classList.remove('hidden', 'fade-out');
                    }
                }
            });
        })();
    </script>
</body>
</html>
